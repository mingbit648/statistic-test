<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>并发测试 - 病历分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <i class="fas fa-file-medical me-2"></i>病历分析系统
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/">
                        <i class="fas fa-home me-1"></i>首页
                    </a>
                    <a class="nav-link" href="/standards">
                        <i class="fas fa-book me-1"></i>知识库
                    </a>
                    <a class="nav-link active" href="/concurrency-test">
                        <i class="fas fa-bolt me-1"></i>并发测试
                    </a>
                    <a class="nav-link" href="/history">
                        <i class="fas fa-history me-1"></i>历史记录
                    </a>
                </div>
            </div>
        </nav>

        <main class="container concurrency-page mt-4">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
                <div>
                    <h2 class="mb-1">
                        <i class="fas fa-bolt me-2"></i>并发测试
                    </h2>
                    <div class="text-muted">批次压测、轮次执行、单次明细追踪</div>
                </div>
                <span class="badge bg-primary fs-6" id="currentBatchBadge">未选择批次</span>
            </div>

            <div id="pageAlertHost"></div>

            <div class="row g-4">
                <div class="col-lg-4">
                    <section class="card concurrency-control-card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-sliders-h me-2"></i>测试配置
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="currentStandardInfo" class="alert alert-info mb-3">
                                <i class="fas fa-spinner fa-spin me-2"></i>正在加载标准信息...
                            </div>

                            <form id="concurrencyForm" enctype="multipart/form-data">
                                <div class="mb-3">
                                    <label for="recordFiles" class="form-label">
                                        <i class="fas fa-file-medical me-2"></i>病历文件
                                    </label>
                                    <input class="form-control" type="file" id="recordFiles" name="record_files" accept=".xml,.md,.txt,.json" multiple required>
                                    <div class="form-text">支持 .xml, .md, .txt, .json，多选上传</div>
                                </div>

                                <div class="row g-3">
                                    <div class="col-6">
                                        <label for="testsPerRecord" class="form-label">每份测试次数</label>
                                        <input class="form-control" type="number" id="testsPerRecord" min="1" max="100" value="10" required>
                                    </div>
                                    <div class="col-6">
                                        <label for="recordsPerRound" class="form-label">每轮病历数</label>
                                        <input class="form-control" type="number" id="recordsPerRound" min="1" value="5" required>
                                    </div>
                                </div>

                                <div class="concurrency-estimate mt-4">
                                    <div>
                                        <span>病历数</span>
                                        <strong id="estimateRecords">0</strong>
                                    </div>
                                    <div>
                                        <span>总测试</span>
                                        <strong id="estimateAttempts">0</strong>
                                    </div>
                                    <div>
                                        <span>单轮测试量</span>
                                        <strong id="estimateConcurrency">0</strong>
                                    </div>
                                    <div>
                                        <span>每组并发</span>
                                        <strong id="estimateGroupConcurrency">0</strong>
                                    </div>
                                    <div>
                                        <span>组间间隔</span>
                                        <strong id="estimateDispatchInterval">2s</strong>
                                    </div>
                                    <div>
                                        <span>总轮次</span>
                                        <strong id="estimateRounds">0</strong>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-success w-100 mt-4" id="startBatchBtn" disabled>
                                    <i class="fas fa-play-circle me-2"></i>开始并发测试
                                </button>
                            </form>
                        </div>
                    </section>

                    <section class="card mt-4">
                        <div class="card-header bg-secondary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-list me-2"></i>历史批次
                            </h5>
                        </div>
                        <div class="card-body p-0">
                            <div id="batchList" class="batch-list"></div>
                        </div>
                    </section>
                </div>

                <div class="col-lg-8">
                    <section class="card">
                        <div class="card-header bg-info text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-chart-line me-2"></i>批次进度
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="emptyBatchState" class="text-center py-5 text-muted">
                                <i class="fas fa-gauge-high fa-3x mb-3"></i>
                                <h5>暂无批次数据</h5>
                            </div>

                            <div id="batchPanel" style="display: none;">
                                <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                                    <div>
                                        <div class="text-muted small">批次 ID</div>
                                        <code id="batchIdText"></code>
                                    </div>
                                    <span class="badge fs-6" id="batchStatusBadge">-</span>
                                </div>

                                <div class="progress mb-3" style="height: 12px;">
                                    <div id="batchProgressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                                </div>

                                <div class="concurrency-stat-grid mb-4">
                                    <div class="concurrency-stat">
                                        <span>当前轮次</span>
                                        <strong id="statRound">0 / 0</strong>
                                    </div>
                                    <div class="concurrency-stat">
                                        <span>当前病历</span>
                                        <strong id="statCurrentRecord">-</strong>
                                    </div>
                                    <div class="concurrency-stat">
                                        <span>已完成</span>
                                        <strong id="statCompleted">0 / 0</strong>
                                    </div>
                                    <div class="concurrency-stat">
                                        <span>成功</span>
                                        <strong class="text-success" id="statSuccess">0</strong>
                                    </div>
                                    <div class="concurrency-stat">
                                        <span>失败</span>
                                        <strong class="text-danger" id="statFailed">0</strong>
                                    </div>
                                    <div class="concurrency-stat">
                                        <span>平均耗时</span>
                                        <strong id="statAvg">0s</strong>
                                    </div>
                                    <div class="concurrency-stat">
                                        <span>最快 / 最慢</span>
                                        <strong id="statMinMax">0s / 0s</strong>
                                    </div>
                                </div>

                                <div class="d-flex flex-wrap gap-2 mb-3">
                                    <select class="form-select form-select-sm concurrency-filter" id="recordFilter">
                                        <option value="">全部病历</option>
                                    </select>
                                    <select class="form-select form-select-sm concurrency-filter" id="roundFilter">
                                        <option value="">全部轮次</option>
                                    </select>
                                    <select class="form-select form-select-sm concurrency-filter" id="statusFilter">
                                        <option value="">全部状态</option>
                                        <option value="pending">等待中</option>
                                        <option value="running">执行中</option>
                                        <option value="success">成功</option>
                                        <option value="failed">失败</option>
                                    </select>
                                </div>

                                <div class="table-responsive concurrency-detail-table">
                                    <table class="table table-sm table-hover align-middle mb-0">
                                        <thead>
                                            <tr>
                                                <th>轮次</th>
                                                <th>组</th>
                                                <th>病历</th>
                                                <th>次数</th>
                                                <th>状态</th>
                                                <th>耗时</th>
                                                <th>摘要 / 错误</th>
                                            </tr>
                                        </thead>
                                        <tbody id="detailTableBody"></tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let hasSelectedStandard = false;
        let currentBatchId = null;
        let currentBatchData = null;
        let pollingTimer = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentStandard();
            loadBatchList();
            bindControls();
            updateEstimate();
        });

        function bindControls() {
            ['recordFiles', 'testsPerRecord', 'recordsPerRound'].forEach(id => {
                document.getElementById(id).addEventListener('input', updateEstimate);
                document.getElementById(id).addEventListener('change', updateEstimate);
            });
            ['recordFilter', 'roundFilter', 'statusFilter'].forEach(id => {
                document.getElementById(id).addEventListener('change', renderDetails);
            });
            document.getElementById('concurrencyForm').addEventListener('submit', startBatch);
        }

        async function loadCurrentStandard() {
            try {
                const response = await fetch('/api/standards');
                const result = await response.json();
                const infoDiv = document.getElementById('currentStandardInfo');

                if (result.status === 'success' && result.data.selected_id) {
                    const selected = result.data.standards.find(item => item.id === result.data.selected_id);
                    if (selected) {
                        infoDiv.className = 'alert alert-success mb-3';
                        infoDiv.innerHTML = `<i class="fas fa-check-circle me-2"></i>当前使用标准：<strong>${escapeHtml(selected.filename)}</strong>`;
                        hasSelectedStandard = true;
                        updateEstimate();
                        return;
                    }
                }

                infoDiv.className = 'alert alert-warning mb-3';
                infoDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>尚未选择标准文件，<a href="/standards">前往知识库选择</a>';
                hasSelectedStandard = false;
                updateEstimate();
            } catch (error) {
                showAlert('加载标准信息失败: ' + error.message, 'danger');
            }
        }

        function updateEstimate() {
            const fileCount = document.getElementById('recordFiles').files.length;
            const testsPerRecord = parseInt(document.getElementById('testsPerRecord').value || '0', 10);
            const recordsPerRound = parseInt(document.getElementById('recordsPerRound').value || '0', 10);
            const totalAttempts = fileCount * testsPerRecord;
            const rounds = fileCount && recordsPerRound ? Math.ceil(fileCount / recordsPerRound) : 0;
            const concurrency = testsPerRecord * recordsPerRound;
            const groupConcurrency = testsPerRecord || 0;

            document.getElementById('estimateRecords').textContent = fileCount;
            document.getElementById('estimateAttempts').textContent = totalAttempts || 0;
            document.getElementById('estimateConcurrency').textContent = concurrency || 0;
            document.getElementById('estimateGroupConcurrency').textContent = groupConcurrency;
            document.getElementById('estimateDispatchInterval').textContent = '2s';
            document.getElementById('estimateRounds').textContent = rounds || 0;

            const valid = hasSelectedStandard
                && fileCount > 0
                && testsPerRecord >= 1
                && testsPerRecord <= 100
                && recordsPerRound >= 1
                && recordsPerRound <= fileCount
                && concurrency <= 100;
            document.getElementById('startBatchBtn').disabled = !valid;
        }

        async function startBatch(event) {
            event.preventDefault();

            const files = Array.from(document.getElementById('recordFiles').files);
            const testsPerRecord = document.getElementById('testsPerRecord').value;
            const recordsPerRound = document.getElementById('recordsPerRound').value;
            const button = document.getElementById('startBatchBtn');
            const originalText = button.innerHTML;

            const formData = new FormData();
            files.forEach(file => formData.append('record_files[]', file));
            formData.append('tests_per_record', testsPerRecord);
            formData.append('records_per_round', recordsPerRound);

            button.disabled = true;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>启动中...';

            try {
                const response = await fetch('/api/concurrency-tests', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (!response.ok || result.status !== 'success') {
                    throw new Error(result.detail || result.message || '启动失败');
                }

                currentBatchId = result.batch_id;
                currentBatchData = result.data;
                renderBatch(currentBatchData);
                startPolling();
                loadBatchList();
                showAlert('并发测试批次已开始', 'success');
            } catch (error) {
                showAlert('启动失败: ' + error.message, 'danger');
            } finally {
                button.innerHTML = originalText;
                updateEstimate();
            }
        }

        async function loadBatchList() {
            try {
                const response = await fetch('/api/concurrency-tests');
                const result = await response.json();
                if (result.status === 'success') {
                    renderBatchList(result.data || []);
                }
            } catch (error) {
                console.error('加载批次列表失败:', error);
            }
        }

        function renderBatchList(batches) {
            const container = document.getElementById('batchList');
            if (!batches.length) {
                container.innerHTML = '<div class="p-4 text-center text-muted">暂无批次</div>';
                return;
            }

            container.innerHTML = batches.slice(0, 20).map(batch => `
                <button type="button" class="batch-list-item ${batch.id === currentBatchId ? 'active' : ''}" onclick="selectBatch('${batch.id}')">
                    <span>
                        <strong>${formatDate(batch.created_at)}</strong>
                        <small>${batch.total_records} 份 · ${batch.total_attempts} 次 · ${batch.total_rounds} 轮</small>
                    </span>
                    ${statusBadge(batch.status)}
                </button>
            `).join('');
        }

        async function selectBatch(batchId) {
            currentBatchId = batchId;
            await refreshCurrentBatch();
            startPolling();
            await loadBatchList();
        }

        function startPolling() {
            if (pollingTimer) {
                clearInterval(pollingTimer);
            }
            pollingTimer = setInterval(refreshCurrentBatch, 2000);
        }

        async function refreshCurrentBatch() {
            if (!currentBatchId) return;
            try {
                const response = await fetch(`/api/concurrency-tests/${currentBatchId}`);
                const result = await response.json();
                if (!response.ok || result.status !== 'success') {
                    throw new Error(result.detail || result.message || '批次不存在');
                }

                currentBatchData = result.data;
                renderBatch(currentBatchData);

                if (['completed', 'failed'].includes(currentBatchData.status) && pollingTimer) {
                    clearInterval(pollingTimer);
                    pollingTimer = null;
                    loadBatchList();
                }
            } catch (error) {
                showAlert('刷新批次失败: ' + error.message, 'danger');
                if (pollingTimer) {
                    clearInterval(pollingTimer);
                    pollingTimer = null;
                }
            }
        }

        function renderBatch(batch) {
            document.getElementById('emptyBatchState').style.display = 'none';
            document.getElementById('batchPanel').style.display = 'block';
            document.getElementById('currentBatchBadge').textContent = `${batch.total_attempts} 次测试`;
            document.getElementById('batchIdText').textContent = batch.id;
            document.getElementById('batchStatusBadge').outerHTML = statusBadge(batch.status, 'batchStatusBadge');

            const percent = batch.total_attempts ? Math.round(batch.completed_attempts / batch.total_attempts * 100) : 0;
            const progressBar = document.getElementById('batchProgressBar');
            progressBar.style.width = percent + '%';
            progressBar.textContent = percent + '%';
            progressBar.setAttribute('aria-valuenow', percent);

            document.getElementById('statRound').textContent = `${batch.current_round || 0} / ${batch.total_rounds}`;
            document.getElementById('statCurrentRecord').textContent = batch.current_record_filename || '-';
            document.getElementById('statCompleted').textContent = `${batch.completed_attempts} / ${batch.total_attempts}`;
            document.getElementById('statSuccess').textContent = batch.success_count;
            document.getElementById('statFailed').textContent = batch.failed_count;
            document.getElementById('statAvg').textContent = formatSeconds(batch.avg_duration_seconds);
            document.getElementById('statMinMax').textContent = `${formatSeconds(batch.min_duration_seconds)} / ${formatSeconds(batch.max_duration_seconds)}`;

            syncFilters(batch);
            renderDetails();
        }

        function syncFilters(batch) {
            const recordFilter = document.getElementById('recordFilter');
            const roundFilter = document.getElementById('roundFilter');
            const previousRecord = recordFilter.value;
            const previousRound = roundFilter.value;
            const records = [...new Set((batch.details || []).map(item => item.record_filename))];

            recordFilter.innerHTML = '<option value="">全部病历</option>' + records.map(name => (
                `<option value="${escapeAttr(name)}">${escapeHtml(name)}</option>`
            )).join('');
            roundFilter.innerHTML = '<option value="">全部轮次</option>' + Array.from({ length: batch.total_rounds }, (_, index) => (
                `<option value="${index + 1}">第 ${index + 1} 轮</option>`
            )).join('');

            if (records.includes(previousRecord)) recordFilter.value = previousRecord;
            if (previousRound && parseInt(previousRound, 10) <= batch.total_rounds) roundFilter.value = previousRound;
        }

        function renderDetails() {
            if (!currentBatchData) return;
            const recordValue = document.getElementById('recordFilter').value;
            const roundValue = document.getElementById('roundFilter').value;
            const statusValue = document.getElementById('statusFilter').value;
            const body = document.getElementById('detailTableBody');

            const rows = (currentBatchData.details || []).filter(item => {
                if (recordValue && item.record_filename !== recordValue) return false;
                if (roundValue && String(item.round_index) !== roundValue) return false;
                if (statusValue && item.status !== statusValue) return false;
                return true;
            });

            if (!rows.length) {
                body.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">无匹配明细</td></tr>';
                return;
            }

            body.innerHTML = rows.map(item => `
                <tr>
                    <td>第 ${item.round_index} 轮</td>
                    <td>第 ${item.dispatch_group_index || '-'} 组</td>
                    <td class="text-break">${escapeHtml(item.record_filename)}</td>
                    <td>${item.attempt_index}</td>
                    <td>${statusBadge(item.status)}</td>
                    <td>${formatSeconds(item.duration_seconds)}</td>
                    <td class="text-break">${formatDetailMessage(item)}</td>
                </tr>
            `).join('');
        }

        function formatDetailMessage(item) {
            if (item.error) return `<span class="text-danger">${escapeHtml(item.error)}</span>`;
            const summary = item.result_summary || {};
            const score = summary.score === undefined || summary.score === null ? '-' : summary.score;
            const grade = summary.grade || '-';
            if (item.status === 'success') return `总分 ${escapeHtml(String(score))} · ${escapeHtml(String(grade))}`;
            if (item.status === 'running') return '执行中';
            return '等待执行';
        }

        function statusBadge(status, id) {
            const map = {
                pending: ['secondary', '等待中'],
                running: ['primary', '执行中'],
                completed: ['success', '已完成'],
                success: ['success', '成功'],
                failed: ['danger', '失败']
            };
            const current = map[status] || ['secondary', status || '-'];
            const idAttr = id ? ` id="${id}"` : '';
            return `<span${idAttr} class="badge bg-${current[0]}">${current[1]}</span>`;
        }

        function showAlert(message, type = 'info') {
            const host = document.getElementById('pageAlertHost');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} alert-dismissible fade show`;
            alert.innerHTML = `${escapeHtml(message)}<button type="button" class="btn-close" data-bs-dismiss="alert"></button>`;
            host.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        function formatSeconds(value) {
            if (value === null || value === undefined || value === 0) return '0s';
            return Number(value).toFixed(2) + 's';
        }

        function formatDate(value) {
            if (!value) return '-';
            return new Date(value).toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function escapeAttr(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }
    </script>
</body>
</html>
