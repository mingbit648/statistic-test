<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>病历分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <!-- 顶部导航栏 -->
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
            <div class="container">
                <a class="navbar-brand" href="/">
                    <i class="fas fa-file-medical me-2"></i>病历分析系统
                </a>
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/standards">
                        <i class="fas fa-book me-1"></i>知识库
                    </a>
                    <a class="nav-link" href="/concurrency-test">
                        <i class="fas fa-bolt me-1"></i>并发测试
                    </a>
                    <a class="nav-link" href="/history">
                        <i class="fas fa-history me-1"></i>历史记录
                    </a>
                </div>
            </div>
        </nav>

        <!-- 主要内容区域 -->
        <div class="row g-0">
            <!-- 左侧分析结果区域 -->
            <div class="col-lg-8">
                <div class="p-4">
                    <!-- 文件上传区域 -->
                    <div class="card mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-upload me-2"></i>文件上传
                            </h5>
                        </div>
                        <div class="card-body">
                            <!-- 当前使用的标准提示 -->
                            <div id="currentStandardInfo" class="alert alert-info mb-3">
                                <i class="fas fa-spinner fa-spin me-2"></i>正在加载标准信息...
                            </div>

                            <div class="dify-config-panel mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <label for="difyApiKeyInput" class="form-label mb-0">
                                        <i class="fas fa-key me-2"></i>Dify 工作流 API Key
                                    </label>
                                    <span id="difyApiKeyStatus" class="badge text-bg-secondary">未加载</span>
                                </div>
                                <form id="difyConfigForm">
                                    <div class="input-group">
                                        <input class="form-control" type="password" id="difyApiKeyInput" autocomplete="off" placeholder="输入新的 Dify API Key 以切换工作流">
                                        <button class="btn btn-outline-primary" type="submit" id="saveDifyApiKeyBtn">
                                            <i class="fas fa-save me-1"></i>保存
                                        </button>
                                    </div>
                                </form>
                                <div id="difyApiKeyHelp" class="form-text">正在读取当前配置...</div>
                            </div>
                            
                            <form id="uploadForm" enctype="multipart/form-data">
                                <div class="mb-3">
                                    <label for="recordFile" class="form-label">
                                        <i class="fas fa-file-medical me-2"></i>病历文件
                                    </label>
                                    <input class="form-control" type="file" id="recordFile" name="record_file" accept=".xml,.md,.txt,.json" required>
                                    <div class="form-text">支持 .xml, .md, .txt, .json 格式的病历文件</div>
                                </div>
                                <div class="mb-3">
                                    <label for="analysisConcurrency" class="form-label">
                                        <i class="fas fa-layer-group me-2"></i>并发次数
                                    </label>
                                    <input class="form-control" type="number" id="analysisConcurrency" name="concurrency" min="1" max="20" value="1" required>
                                    <div class="form-text">同一份病历最多并发分析 20 次，普通分析保持 1 次即可</div>
                                </div>
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success btn-lg" id="analyzeBtn">
                                        <i class="fas fa-play-circle me-2"></i>开始分析
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- 分析进度显示区域 -->
                    <div id="analysisProgress" style="display: none;">
                        <div class="card mb-4">
                            <div class="card-header bg-info text-white">
                                <h5 class="mb-0">
                                    <i class="fas fa-cogs me-2"></i>分析进度
                                </h5>
                            </div>
                            <div class="card-body">
                                <div class="d-flex align-items-center mb-3">
                                    <div class="spinner-border text-primary me-3" role="status">
                                        <span class="visually-hidden">分析中...</span>
                                    </div>
                                    <div>
                                        <h6 class="mb-1">正在分析病历文件...</h6>
                                        <div class="progress" style="height: 8px; width: 300px;">
                                            <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                                        </div>
                                    </div>
                                </div>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="d-flex justify-content-between">
                                            <span class="text-muted">当前状态:</span>
                                            <span id="currentStatus" class="fw-bold">准备中</span>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="d-flex justify-content-between">
                                            <span class="text-muted">已用时间:</span>
                                            <span id="elapsedTime" class="fw-bold">0s</span>
                                        </div>
                                    </div>
                                </div>
                                <div id="batchProgressStats" class="row mt-3 g-2" style="display: none;">
                                    <div class="col-md-3 col-6">
                                        <div class="border rounded p-2 text-center bg-light">
                                            <div class="text-muted small">总次数</div>
                                            <strong id="batchTotalAttempts">0</strong>
                                        </div>
                                    </div>
                                    <div class="col-md-3 col-6">
                                        <div class="border rounded p-2 text-center bg-light">
                                            <div class="text-muted small">已完成</div>
                                            <strong id="batchCompletedAttempts">0</strong>
                                        </div>
                                    </div>
                                    <div class="col-md-3 col-6">
                                        <div class="border rounded p-2 text-center bg-light">
                                            <div class="text-muted small">成功</div>
                                            <strong id="batchSuccessAttempts" class="text-success">0</strong>
                                        </div>
                                    </div>
                                    <div class="col-md-3 col-6">
                                        <div class="border rounded p-2 text-center bg-light">
                                            <div class="text-muted small">失败</div>
                                            <strong id="batchFailedAttempts" class="text-danger">0</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="attemptSwitcher" class="card mb-4" style="display: none;">
                        <div class="card-header bg-secondary text-white">
                            <h5 class="mb-0">
                                <i class="fas fa-list-check me-2"></i>分析结果切换
                            </h5>
                        </div>
                        <div class="card-body">
                            <div id="attemptButtons" class="d-flex flex-wrap gap-2"></div>
                            <div id="attemptError" class="alert alert-danger mt-3 mb-0" style="display: none;"></div>
                        </div>
                    </div>

                    <!-- 分析结果区域 -->
                    <div id="analysisResult" style="display: none;">
                        <!-- 耗时统计 -->
                        <div class="card mb-4">
                            <div class="card-header bg-secondary text-white">
                                <h5 class="mb-0">
                                    <i class="fas fa-clock me-2"></i>分析统计
                                </h5>
                            </div>
                            <div class="card-body">
                                <div class="row text-center">
                                    <div class="col-md-4">
                                        <div class="border rounded p-3">
                                            <h3 id="totalTime" class="text-primary mb-1">0s</h3>
                                            <small class="text-muted">总耗时</small>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="border rounded p-3">
                                            <h3 id="fileSize" class="text-success mb-1">0 KB</h3>
                                            <small class="text-muted">文件大小</small>
                                        </div>
                                    </div>
                                    <div class="col-md-4">
                                        <div class="border rounded p-3">
                                            <h3 id="analysisTime" class="text-warning mb-1">0s</h3>
                                            <small class="text-muted">分析时间</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 病历等级分析 -->
                        <div class="card mb-4">
                            <div class="card-header bg-success text-white">
                                <h5 class="mb-0">
                                    <i class="fas fa-chart-bar me-2"></i>病历等级分析
                                </h5>
                            </div>
                            <div class="card-body">
                                <div id="recordRating" class="markdown-content"></div>
                            </div>
                        </div>

                        <!-- 全国性分析问题 -->
                        <div class="card mb-4">
                            <div class="card-header bg-warning text-dark">
                                <h5 class="mb-0">
                                    <i class="fas fa-exclamation-triangle me-2"></i>全国性分析问题
                                </h5>
                            </div>
                            <div class="card-body">
                                <div id="recordAll" class="markdown-content"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧病历信息区域 -->
            <div class="col-lg-4 bg-light">
                <div class="p-4 fixed-record-info" style="position: sticky; top: 0; height: 100vh; overflow: hidden;">
                    <h5 class="mb-3">
                        <i class="fas fa-info-circle me-2"></i>病历信息
                    </h5>
                    <div id="recordInfo" class="record-info-content" style="height: calc(100vh - 200px); overflow-y: auto; border: 1px solid #dee2e6; border-radius: 0.375rem; padding: 1rem; background-color: white;">
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            请上传病历文件进行分析
                        </div>
                    </div>
                    
                    <!-- 操作按钮区域 -->
                    <div class="mt-4" id="actionButtons" style="display: none;">
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" onclick="saveToHistory()">
                                <i class="fas fa-save me-2"></i>保存到历史记录
                            </button>
                            <button class="btn btn-outline-secondary" onclick="refreshAnalysis()">
                                <i class="fas fa-redo me-2"></i>重新分析
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 非阻塞加载提示 -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="loadingToast" class="toast align-items-center text-white bg-primary border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    <i class="fas fa-spinner fa-spin me-2"></i>正在分析文件...
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentResult = null;
        let currentRecordId = null;
        let hasSelectedStandard = false;
        let currentBatchId = null;
        let currentBatchData = null;
        let batchPollingInterval = null;
        let selectedAttemptId = null;
        let currentStandardId = null;
        let currentStandardName = null;

        // 页面加载时检查标准文件状态和 Dify 配置
        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentStandard();
            loadDifyConfig();
            restoreRecentAnalysisBatch();
        });

        // 加载当前选中的标准信息
        async function loadCurrentStandard() {
            try {
                const response = await fetch('/api/standards');
                const result = await response.json();
                
                const infoDiv = document.getElementById('currentStandardInfo');
                const analyzeBtn = document.getElementById('analyzeBtn');
                
                if (result.status === 'success' && result.data.selected_id) {
                    const selected = result.data.standards.find(s => s.id === result.data.selected_id);
                    if (selected) {
                        currentStandardId = selected.id;
                        currentStandardName = selected.filename;
                        infoDiv.className = 'alert alert-success mb-3';
                        infoDiv.innerHTML = `<i class="fas fa-check-circle me-2"></i>当前使用标准：<strong>${selected.filename}</strong>
                            <a href="/standards" class="ms-2">切换标准</a>`;
                        hasSelectedStandard = true;
                        analyzeBtn.disabled = currentBatchData && ['pending', 'running'].includes(currentBatchData.status);
                        return;
                    }
                }
                
                infoDiv.className = 'alert alert-warning mb-3';
                infoDiv.innerHTML = `<i class="fas fa-exclamation-triangle me-2"></i>尚未选择标准文件，<a href="/standards">请先到知识库选择标准</a>`;
                currentStandardId = null;
                currentStandardName = null;
                hasSelectedStandard = false;
                analyzeBtn.disabled = true;
            } catch (error) {
                console.error('加载标准信息失败:', error);
            }
        }

        // 加载 Dify API Key 状态
        async function loadDifyConfig() {
            const statusBadge = document.getElementById('difyApiKeyStatus');
            const helpText = document.getElementById('difyApiKeyHelp');

            try {
                const response = await fetch('/api/dify-config');
                const result = await response.json();

                if (result.status !== 'success') {
                    throw new Error(result.message || '读取 Dify 配置失败');
                }

                const data = result.data || {};
                if (data.has_api_key) {
                    statusBadge.className = 'badge text-bg-success';
                    statusBadge.textContent = data.api_key_masked || '已配置';
                    helpText.textContent = data.env_override
                        ? `当前 Base URL：${data.base_url}。检测到 DIFY_API_KEY 环境变量，服务重启后会覆盖配置文件。`
                        : `当前 Base URL：${data.base_url}。保存新 API Key 后，下一次分析会使用新的工作流。`;
                } else {
                    statusBadge.className = 'badge text-bg-warning';
                    statusBadge.textContent = '未配置';
                    helpText.textContent = `当前 Base URL：${data.base_url || '-'}。请先保存 Dify API Key。`;
                }
            } catch (error) {
                console.error('加载 Dify 配置失败:', error);
                statusBadge.className = 'badge text-bg-danger';
                statusBadge.textContent = '读取失败';
                helpText.textContent = '无法读取 Dify 配置，请检查后端服务。';
            }
        }

        // 保存 Dify API Key
        document.getElementById('difyConfigForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const input = document.getElementById('difyApiKeyInput');
            const saveBtn = document.getElementById('saveDifyApiKeyBtn');
            const apiKey = input.value.trim();

            if (!apiKey) {
                showAlert('请输入 Dify API Key', 'warning');
                input.focus();
                return;
            }

            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>保存中';
            saveBtn.disabled = true;

            try {
                const response = await fetch('/api/dify-config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ api_key: apiKey })
                });
                const result = await response.json();

                if (!response.ok || result.status !== 'success') {
                    throw new Error(result.detail || result.message || '保存失败');
                }

                input.value = '';
                showAlert(result.message || 'Dify API Key 已保存', 'success');
                await loadDifyConfig();
            } catch (error) {
                console.error('保存 Dify API Key 失败:', error);
                showAlert('保存 Dify API Key 失败: ' + error.message, 'danger');
            } finally {
                saveBtn.innerHTML = originalText;
                saveBtn.disabled = false;
            }
        });

        async function fetchSelectedStandard() {
            const response = await fetch('/api/standards');
            const result = await response.json();
            if (!response.ok || result.status !== 'success') {
                throw new Error(result.detail || result.message || '读取标准文件失败');
            }

            const selectedId = result.data.selected_id;
            if (!selectedId) {
                return null;
            }
            return result.data.standards.find(item => item.id === selectedId) || null;
        }

        async function refreshStandardBeforeSubmit() {
            const latest = await fetchSelectedStandard();
            if (!latest) {
                await loadCurrentStandard();
                showAlert('当前未选择标准文件，请先到知识库选择标准', 'warning');
                return null;
            }

            if (currentStandardId && currentStandardId !== latest.id) {
                const previousName = currentStandardName || '未加载标准';
                currentStandardId = latest.id;
                currentStandardName = latest.filename;
                await loadCurrentStandard();
                const confirmed = confirm(`当前实际使用标准已变更：${previousName} -> ${latest.filename}。\n本次分析将使用 ${latest.filename}，是否继续？`);
                return confirmed ? latest : null;
            }

            if (!currentStandardId) {
                currentStandardId = latest.id;
                currentStandardName = latest.filename;
                await loadCurrentStandard();
            }

            return latest;
        }

        // 文件上传表单处理
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!hasSelectedStandard) {
                showAlert('请先到知识库选择标准文件', 'warning');
                return;
            }
            
            const recordFile = document.getElementById('recordFile').files[0];
            const concurrency = parseInt(document.getElementById('analysisConcurrency').value || '1', 10);
            
            if (!recordFile) {
                showAlert('请选择病历文件', 'warning');
                return;
            }
            if (!Number.isInteger(concurrency) || concurrency < 1 || concurrency > 20) {
                showAlert('并发次数必须在 1-20 之间', 'warning');
                return;
            }

            let confirmedStandard = null;
            try {
                confirmedStandard = await refreshStandardBeforeSubmit();
            } catch (error) {
                showAlert('提交前检查标准失败: ' + error.message, 'danger');
                return;
            }
            if (!confirmedStandard) {
                return;
            }
            
            // 显示分析进度区域
            document.getElementById('analysisProgress').style.display = 'block';
            document.getElementById('analysisResult').style.display = 'none';
            document.getElementById('attemptSwitcher').style.display = 'none';
            
            // 显示加载提示
            const submitBtn = document.querySelector('#uploadForm button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>分析中...';
            submitBtn.disabled = true;
            
            try {
                const formData = new FormData();
                formData.append('record_file', recordFile);
                formData.append('concurrency', concurrency);
                formData.append('session_id', getAnalysisSessionId());
                formData.append('confirmed_standard_id', confirmedStandard.id);
                
                const response = await fetch('/api/analysis/batches', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.status === 409 && result.status === 'standard_changed') {
                    const latest = result.data || {};
                    currentStandardId = latest.selected_id || null;
                    currentStandardName = latest.filename || null;
                    await loadCurrentStandard();
                    throw new Error(`当前实际使用标准已变更为 ${latest.filename || '新标准'}，请确认后重新提交`);
                }

                if (!response.ok || result.status !== 'success') {
                    throw new Error(result.detail || result.message || '分析批次创建失败');
                }

                handleBatchStarted(result.data);
                showAlert(concurrency > 1 ? `分析批次已开始，共 ${concurrency} 次` : '分析任务已开始，请等待...', 'info');
            } catch (error) {
                console.error('分析错误:', error);
                showAlert('分析过程中发生错误: ' + error.message, 'danger');
                // 隐藏进度区域
                document.getElementById('analysisProgress').style.display = 'none';
                // 恢复按钮状态
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // 保存到历史记录
        async function saveToHistory() {
            if (!currentRecordId) {
                showAlert('请先完成分析', 'warning');
                return;
            }
            
            try {
                showAlert('结果已自动保存到历史记录', 'success');
                
                // 打开历史记录页面
                setTimeout(() => {
                    window.open('/history', '_blank');
                }, 1000);
            } catch (error) {
                console.error('保存失败:', error);
                showAlert('保存失败: ' + error.message, 'danger');
            }
        }

        // 重新分析
        function refreshAnalysis() {
            // 清空表单
            document.getElementById('uploadForm').reset();
            
            // 隐藏结果区域
            document.getElementById('analysisResult').style.display = 'none';
            document.getElementById('actionButtons').style.display = 'none';
            document.getElementById('attemptSwitcher').style.display = 'none';
            document.getElementById('analysisProgress').style.display = 'none';
            
            // 重置病历信息显示
            document.getElementById('recordInfo').innerHTML = `
                <div class="alert alert-info">
                    <i class="fas fa-info-circle me-2"></i>
                    请上传病历文件进行分析
                </div>
            `;
            
            currentResult = null;
            currentRecordId = null;
            currentBatchId = null;
            currentBatchData = null;
            selectedAttemptId = null;
            if (batchPollingInterval) {
                clearInterval(batchPollingInterval);
                batchPollingInterval = null;
            }
            
            showAlert('已重置，请重新上传文件进行分析', 'info');
        }

        // 显示提示消息
        function showAlert(message, type) {
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type} alert-dismissible fade show`;
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            // 添加到页面顶部
            const container = document.querySelector('.container-fluid');
            container.insertBefore(alertDiv, container.firstChild);
            
            // 3秒后自动消失
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.remove();
                }
            }, 3000);
        }

        // 拖拽上传功能
        function setupDragAndDrop() {
            const dropZone = document.getElementById('uploadForm');
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, unhighlight, false);
            });
            
            function highlight() {
                dropZone.classList.add('drag-over');
            }
            
            function unhighlight() {
                dropZone.classList.remove('drag-over');
            }
            
            dropZone.addEventListener('drop', handleDrop, false);
            
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                
                if (files.length >= 1) {
                    // 自动填充文件输入框
                    const transfer = new DataTransfer();
                    transfer.items.add(files[0]);
                    document.getElementById('recordFile').files = transfer.files;
                } else {
                    showAlert('请拖拽一份病历文件', 'warning');
                }
            }
        }

        // 初始化拖拽功能
        setupDragAndDrop();

        function getAnalysisSessionId() {
            const key = 'analysis_session_id';
            let sessionId = localStorage.getItem(key);
            if (!sessionId) {
                sessionId = 'session-' + Date.now() + '-' + Math.random().toString(16).slice(2);
                localStorage.setItem(key, sessionId);
            }
            return sessionId;
        }

        async function restoreRecentAnalysisBatch() {
            try {
                const response = await fetch(`/api/analysis/batches/recent?session_id=${encodeURIComponent(getAnalysisSessionId())}`);
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    handleBatchStarted(result.data, true);
                }
            } catch (error) {
                console.warn('恢复分析批次失败:', error);
            }
        }

        function handleBatchStarted(batch, restored = false) {
            currentBatchId = batch.id;
            currentBatchData = batch;
            selectedAttemptId = null;
            document.getElementById('analysisProgress').style.display = 'block';
            document.getElementById('analysisResult').style.display = 'none';
            document.getElementById('attemptSwitcher').style.display = 'none';
            setAnalyzeButtonBusy(batch.status === 'running' || batch.status === 'pending');
            renderBatchProgress(batch);

            if (batch.status === 'running' || batch.status === 'pending') {
                startBatchPolling();
                if (restored) {
                    showAlert('已恢复正在进行的分析批次', 'info');
                }
            } else {
                stopBatchPolling();
                renderAttemptButtons(batch);
                displayFirstSuccessfulAttempt(batch);
            }
        }

        function startBatchPolling() {
            stopBatchPolling();
            refreshCurrentBatch();
            batchPollingInterval = setInterval(refreshCurrentBatch, 2000);
        }

        function stopBatchPolling() {
            if (batchPollingInterval) {
                clearInterval(batchPollingInterval);
                batchPollingInterval = null;
            }
        }

        async function refreshCurrentBatch() {
            if (!currentBatchId) return;
            try {
                const response = await fetch(`/api/analysis/batches/${currentBatchId}`);
                const result = await response.json();
                if (!response.ok || result.status !== 'success') {
                    throw new Error(result.detail || result.message || '分析批次不存在');
                }

                currentBatchData = result.data;
                renderBatchProgress(currentBatchData);
                renderAttemptButtons(currentBatchData);

                if (currentBatchData.status === 'completed' || currentBatchData.status === 'failed') {
                    stopBatchPolling();
                    setAnalyzeButtonBusy(false);
                    displayFirstSuccessfulAttempt(currentBatchData);
                }
            } catch (error) {
                console.error('刷新分析批次失败:', error);
                showAlert('刷新分析进度失败: ' + error.message, 'warning');
                stopBatchPolling();
                setAnalyzeButtonBusy(false);
            }
        }

        function renderBatchProgress(batch) {
            const attempts = batch.attempts || [];
            const total = batch.total_attempts || attempts.length || 1;
            const progress = Math.round(attempts.reduce((sum, item) => sum + (item.progress || 0), 0) / total);
            const runningAttempt = attempts.find(item => item.status === 'running');
            const pendingCount = attempts.filter(item => item.status === 'pending').length;

            const progressBar = document.getElementById('progressBar');
            progressBar.style.width = progress + '%';
            progressBar.setAttribute('aria-valuenow', progress);
            progressBar.textContent = progress + '%';

            if (runningAttempt) {
                document.getElementById('currentStatus').textContent = `第 ${runningAttempt.attempt_index} 次：${runningAttempt.current_step || '分析中'}`;
            } else if (batch.status === 'completed') {
                document.getElementById('currentStatus').textContent = '分析完成';
            } else if (batch.status === 'failed') {
                document.getElementById('currentStatus').textContent = '全部分析失败';
            } else {
                document.getElementById('currentStatus').textContent = pendingCount ? `等待开始（${pendingCount} 次）` : '准备中';
            }

            const createdAt = batch.started_at || batch.created_at;
            const elapsed = createdAt ? Math.max(0, (Date.now() - new Date(createdAt).getTime()) / 1000) : 0;
            document.getElementById('elapsedTime').textContent = elapsed.toFixed(1) + '秒';

            document.getElementById('batchProgressStats').style.display = 'flex';
            document.getElementById('batchTotalAttempts').textContent = batch.total_attempts || attempts.length || 0;
            document.getElementById('batchCompletedAttempts').textContent = batch.completed_attempts || 0;
            document.getElementById('batchSuccessAttempts').textContent = batch.success_count || 0;
            document.getElementById('batchFailedAttempts').textContent = batch.failed_count || 0;
        }

        function renderAttemptButtons(batch) {
            const attempts = batch.attempts || [];
            const host = document.getElementById('attemptButtons');
            if (!attempts.length) {
                document.getElementById('attemptSwitcher').style.display = 'none';
                return;
            }

            document.getElementById('attemptSwitcher').style.display = 'block';
            host.innerHTML = attempts.map(attempt => {
                const active = attempt.attempt_id === selectedAttemptId ? 'active' : '';
                const disabled = attempt.status === 'pending' || attempt.status === 'running' ? 'disabled' : '';
                const klass = attempt.status === 'success'
                    ? 'btn-outline-success'
                    : attempt.status === 'failed'
                        ? 'btn-outline-danger'
                        : 'btn-outline-secondary';
                const label = attempt.status === 'running'
                    ? `第 ${attempt.attempt_index} 次 分析中`
                    : attempt.status === 'failed'
                        ? `第 ${attempt.attempt_index} 次 失败`
                        : attempt.status === 'success'
                            ? `第 ${attempt.attempt_index} 次`
                            : `第 ${attempt.attempt_index} 次 等待`;
                return `<button type="button" class="btn btn-sm ${klass} ${active}" ${disabled} onclick="selectBatchAttempt('${attempt.attempt_id}')">${escapeHtml(label)}</button>`;
            }).join('');
        }

        async function displayFirstSuccessfulAttempt(batch) {
            const attempts = batch.attempts || [];
            const firstSuccess = attempts.find(item => item.status === 'success');
            if (firstSuccess) {
                await selectBatchAttempt(firstSuccess.attempt_id);
                return;
            }

            const firstFailure = attempts.find(item => item.status === 'failed');
            if (firstFailure) {
                selectBatchAttempt(firstFailure.attempt_id);
            }
        }

        async function selectBatchAttempt(attemptId) {
            selectedAttemptId = attemptId;
            if (currentBatchData) {
                renderAttemptButtons(currentBatchData);
            }

            const attempt = (currentBatchData?.attempts || []).find(item => item.attempt_id === attemptId);
            const errorDiv = document.getElementById('attemptError');
            errorDiv.style.display = 'none';

            if (!attempt) return;
            if (attempt.status === 'failed') {
                document.getElementById('analysisResult').style.display = 'none';
                errorDiv.textContent = `第 ${attempt.attempt_index} 次分析失败：${attempt.error || '未知错误'}`;
                errorDiv.style.display = 'block';
                return;
            }
            if (attempt.status !== 'success') return;

            try {
                const response = await fetch(`/api/analysis/batches/${currentBatchId}/attempts/${attemptId}`);
                const result = await response.json();
                if (!response.ok || result.status !== 'success') {
                    throw new Error(result.detail || result.message || '读取结果失败');
                }
                const fullAttempt = result.data;
                displayAnalysisResult({
                    result: fullAttempt.result,
                    record_id: fullAttempt.history_record_id,
                    duration_seconds: fullAttempt.duration_seconds
                });
            } catch (error) {
                showAlert('读取分析结果失败: ' + error.message, 'danger');
            }
        }

        function setAnalyzeButtonBusy(isBusy) {
            const submitBtn = document.querySelector('#uploadForm button[type="submit"]');
            if (isBusy) {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>分析中...';
                submitBtn.disabled = true;
            } else {
                submitBtn.innerHTML = '<i class="fas fa-play-circle me-2"></i>开始分析';
                submitBtn.disabled = !hasSelectedStandard;
            }
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 分析任务轮询和进度更新功能
        let currentTaskId = null;
        let pollingInterval = null;
        let pollingStartTime = null;
        let notFoundRetryCount = 0;  // 任务不存在重试计数
        const MAX_POLLING_TIME = 20 * 60 * 1000;  // 17分钟超时，需大于后端1000秒超时
        const MAX_NOT_FOUND_RETRIES = 3;  // 任务不存在最大重试次数

        // 开始轮询任务状态
        function startTaskPolling(taskId) {
            currentTaskId = taskId;
            pollingStartTime = Date.now();
            notFoundRetryCount = 0;  // 重置重试计数
            
            // 延迟500ms后开始首次查询，避免任务还未完全创建
            setTimeout(() => {
                checkTaskStatus();
                
                // 设置轮询间隔（每2秒查询一次）
                pollingInterval = setInterval(() => {
                    // 检查是否超过最大轮询时间
                    if (Date.now() - pollingStartTime > MAX_POLLING_TIME) {
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        
                        showAlert('分析超时（超过10分钟），请重新上传文件开始新的分析', 'warning');
                        document.getElementById('analysisProgress').style.display = 'none';
                        
                        const submitBtn = document.querySelector('#uploadForm button[type="submit"]');
                        submitBtn.innerHTML = '<i class="fas fa-play-circle me-2"></i>开始分析';
                        submitBtn.disabled = false;
                        return;
                    }
                    
                    checkTaskStatus();
                }, 2000);
            }, 500);
        }

        // 检查任务状态
        async function checkTaskStatus() {
            if (!currentTaskId) return;
            
            try {
                const response = await fetch(`/api/analysis/task/${currentTaskId}`);
                const result = await response.json();
                
                if (result.status === 'success') {
                    const taskData = result.data;
                    
                    // 更新进度显示
                    updateProgressDisplay(taskData);
                    
                    // 检查任务是否完成
                    if (taskData.status === 'completed') {
                        // 任务完成，停止轮询
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        
                        // 显示分析结果
                        if (result.result) {
                            displayAnalysisResult(result.result);
                            showAlert('分析完成！', 'success');
                        }
                        
                        // 恢复按钮状态
                        const submitBtn = document.querySelector('#uploadForm button[type="submit"]');
                        submitBtn.innerHTML = '<i class="fas fa-play-circle me-2"></i>开始分析';
                        submitBtn.disabled = false;
                        
                    } else if (taskData.status === 'failed') {
                        // 任务失败，停止轮询
                        clearInterval(pollingInterval);
                        pollingInterval = null;
                        
                        showAlert('分析失败: ' + (result.error || '未知错误'), 'danger');
                        
                        // 隐藏进度区域
                        document.getElementById('analysisProgress').style.display = 'none';
                        
                        // 恢复按钮状态
                        const submitBtn = document.querySelector('#uploadForm button[type="submit"]');
                        submitBtn.innerHTML = '<i class="fas fa-play-circle me-2"></i>开始分析';
                        submitBtn.disabled = false;
                    }
                } else if (result.status === 'error') {
                    // 处理任务错误情况
                    console.warn('任务错误:', result.message);
                    
                    // 任务不存在时，先重试几次再报错
                    if (result.data && result.data.status === 'not_found') {
                        notFoundRetryCount++;
                        if (notFoundRetryCount < MAX_NOT_FOUND_RETRIES) {
                            console.log(`任务暂未找到，等待重试 (${notFoundRetryCount}/${MAX_NOT_FOUND_RETRIES})`);
                            return;  // 继续等待下次轮询
                        }
                    }
                    
                    // 停止轮询
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    
                    // 区分不同的错误类型
                    let errorMessage = '分析任务出错，请重新上传文件开始新的分析';
                    
                    if (result.data && result.data.status === 'expired') {
                        errorMessage = '分析任务已过期（超过24小时），请重新上传文件开始新的分析';
                    } else if (result.data && result.data.status === 'not_found') {
                        errorMessage = '分析任务不存在，请重新上传文件开始新的分析';
                    }
                    
                    showAlert(errorMessage, 'warning');
                    
                    // 隐藏进度区域
                    document.getElementById('analysisProgress').style.display = 'none';
                    
                    // 恢复按钮状态
                    const submitBtn = document.querySelector('#uploadForm button[type="submit"]');
                    submitBtn.innerHTML = '<i class="fas fa-play-circle me-2"></i>开始分析';
                    submitBtn.disabled = false;
                } else {
                    console.error('查询任务状态失败:', result);
                }
            } catch (error) {
                console.error('查询任务状态错误:', error);
            }
        }

        // 简单的 Markdown 转 HTML 函数（处理标题和表格）
        function simpleMarkdownToHtml(text) {
            if (!text) return text;
            
            // 处理标题 ## 
            text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            
            // 处理粗体 **text**
            text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // 处理 Markdown 表格
            const lines = text.split('\n');
            let result = [];
            let inTable = false;
            let tableRows = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                // 检测表格行（以 | 开头和结尾）
                if (line.startsWith('|') && line.endsWith('|')) {
                    if (!inTable) {
                        inTable = true;
                        tableRows = [];
                    }
                    tableRows.push(line);
                } else {
                    // 如果之前在表格中，现在不是表格行了，输出表格
                    if (inTable) {
                        result.push(convertTableToHtml(tableRows));
                        inTable = false;
                        tableRows = [];
                    }
                    result.push(line);
                }
            }
            
            // 处理最后的表格
            if (inTable && tableRows.length > 0) {
                result.push(convertTableToHtml(tableRows));
            }
            
            return result.join('\n');
        }
        
        // 将 Markdown 表格行转换为 HTML 表格
        function convertTableToHtml(rows) {
            if (rows.length < 2) return rows.join('\n');
            
            let html = '<table class="table table-striped table-bordered">\n<thead>\n<tr>\n';
            
            // 处理表头（第一行）
            const headerCells = rows[0].split('|').filter(cell => cell.trim() !== '');
            headerCells.forEach(cell => {
                html += `<th>${cell.trim()}</th>\n`;
            });
            html += '</tr>\n</thead>\n<tbody>\n';
            
            // 跳过分隔行（第二行，通常是 |:---|:---|）
            // 处理数据行（从第三行开始）
            for (let i = 2; i < rows.length; i++) {
                const cells = rows[i].split('|').filter(cell => cell.trim() !== '');
                html += '<tr>\n';
                cells.forEach(cell => {
                    html += `<td>${cell.trim()}</td>\n`;
                });
                html += '</tr>\n';
            }
            
            html += '</tbody>\n</table>';
            return html;
        }

        // 解析 think 标签内容，按最后一个 </think> 分离思考过程和最终结果
        function parseThinkContent(html) {
            if (!html) return { thinkContent: null, resultContent: html };

            const closeThinkRegex = /<\/think>/gi;
            let match;
            let lastCloseThink = null;

            while ((match = closeThinkRegex.exec(html)) !== null) {
                lastCloseThink = {
                    index: match.index,
                    end: closeThinkRegex.lastIndex
                };
            }

            if (lastCloseThink) {
                let thinkContent = html.substring(0, lastCloseThink.index).trim();
                let resultContent = html.substring(lastCloseThink.end).trim();

                thinkContent = thinkContent
                    .replace(/^\s*<div\b(?=[^>]*\bclass=(["'])[^"']*\bthink-wrapper\b[^"']*\1)[^>]*>\s*/i, '')
                    .replace(/^\s*<p>\s*(?=<think\b)/i, '')
                    .replace(/<\/?think\b[^>]*>/gi, '')
                    .trim();

                resultContent = resultContent
                    .replace(/^\s*(?:<\/div>|<\/p>)+\s*/i, '')
                    .trim();

                if (resultContent && !resultContent.startsWith('<h') && !resultContent.startsWith('<table')) {
                    const firstPEnd = resultContent.indexOf('</p>');
                    if (firstPEnd > 0) {
                        const mdContent = resultContent.substring(0, firstPEnd);
                        const restContent = resultContent.substring(firstPEnd + 4);
                        resultContent = simpleMarkdownToHtml(mdContent) + restContent;
                    }
                }

                return {
                    thinkContent: thinkContent || null,
                    resultContent: resultContent || html
                };
            }

            return { thinkContent: null, resultContent: html };
        }



        // 解析 count 字段（JSON字符串）
        function parseCountData(countStr) {
            if (!countStr) return null;
            try {
                // count 可能是 JSON 字符串，需要解析
                if (typeof countStr === 'string') {
                    return JSON.parse(countStr);
                }
                return countStr;
            } catch (e) {
                console.warn('解析 count 数据失败:', e);
                return null;
            }
        }

                            <div class="card bg-warning bg-opacity-10 border-warning border-opacity-25 h-100">
                                <div class="card-body text-center py-2">
                                    <h4 class="mb-0 text-warning">${major}</h4>
                                    <small class="text-warning">重大缺陷</small>
                                </div>
                            </div>
                        </div>
                        <div class="col-4">
                            <div class="card bg-info bg-opacity-10 border-info border-opacity-25 h-100">
                                <div class="card-body text-center py-2">
                                    <h4 class="mb-0 text-info">${minor}</h4>
                                    <small class="text-info">一般缺陷</small>
                                </div>
                            </div>
                        </div>
                    </div>
                    ${dimensionHtml}
                </div>
            `;
        }

        // 格式化 record_rating 内容，处理 think 标签
        function formatRatingContent(html, countData) {
            const { thinkContent, resultContent } = parseThinkContent(html);
            
            // 生成统计卡片（从 count 数据）
            const scoreCard = generateScoreCard(countData);
            
            let result = scoreCard;
            
            // 添加质控结果内容
            result += `
                <div class="rating-result">
                    ${resultContent}
                </div>
            `;
            
            // 添加 AI 思考过程折叠区域
            if (thinkContent) {
                result += `
                    <div class="think-section mt-4 pt-3 border-top">
                        <button class="btn btn-outline-secondary btn-sm" type="button" 
                                data-bs-toggle="collapse" data-bs-target="#thinkProcess" 
                                aria-expanded="false" aria-controls="thinkProcess">
                            <i class="fas fa-brain me-1"></i>查看 AI 思考过程
                        </button>
                        <div class="collapse mt-3" id="thinkProcess">
                            <div class="card">
                                <div class="card-body think-content">
                                    ${thinkContent}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            return result;
        }

        // 显示分析结果
        function displayAnalysisResult(result) {
            currentResult = result.result;
            currentRecordId = result.record_id;
            
            // ✓ 恢复按钮状态
            const submitBtn = document.querySelector('#uploadForm button[type="submit"]');
            submitBtn.innerHTML = '<i class="fas fa-play-circle me-2"></i>开始分析';
            submitBtn.disabled = false;
            
            // 隐藏进度区域，显示结果区域
            document.getElementById('analysisProgress').style.display = 'none';
            document.getElementById('analysisResult').style.display = 'block';
            document.getElementById('actionButtons').style.display = 'block';
            
            // 解析 count 数据
            const countData = parseCountData(currentResult.count);
            
            // 显示分析结果（处理 think 标签和 count 统计卡片）
            document.getElementById('recordRating').innerHTML = formatRatingContent(currentResult.record_rating, countData);
            document.getElementById('recordAll').innerHTML = currentResult.record_all;
            document.getElementById('recordInfo').innerHTML = currentResult.record;

            const duration = Number(result.duration_seconds || 0);
            if (duration > 0) {
                document.getElementById('totalTime').textContent = duration.toFixed(1) + '秒';
                document.getElementById('analysisTime').textContent = duration.toFixed(1) + '秒';
            }
            const recordFile = document.getElementById('recordFile').files[0];
            if (recordFile) {
                document.getElementById('fileSize').textContent = (recordFile.size / 1024).toFixed(1) + ' KB';
            } else if (currentBatchData?.record_filename) {
                document.getElementById('fileSize').textContent = currentBatchData.record_filename;
            }
        }
        
        // 从API响应中获取任务数据
        function getTaskDataFromResponse() {
            // 这里可以扩展为从API响应中获取更多任务信息
            return {
                total_time: parseFloat(document.getElementById('totalTime').textContent) || 0
            };
        }

        // 页面卸载时清理轮询
        window.addEventListener('beforeunload', function() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
            }
            if (batchPollingInterval) {
                clearInterval(batchPollingInterval);
            }
        });
    </script>
</body>
</html>
